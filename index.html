<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A simple, user-friendly arithmetic calculator that runs entirely in your browser." />
  <title>Arithmetic Calculator</title>
  <style>
    /* ===== Theme variables ===== */
    :root {
      --bg: #1e1e2f;
      --panel: #2a2a3d;
      --display-bg: #11111c;
      --text: #ffffff;
      --muted: #9a9ab0;
      --btn: #3a3a52;
      --btn-hover: #4a4a66;
      --op: #ff9f0a;
      --op-hover: #ffb340;
      --equals: #30d158;
      --equals-hover: #4be077;
      --clear: #ff453a;
      --clear-hover: #ff6961;
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    .calculator {
      background: var(--panel);
      padding: 20px;
      border-radius: 24px;
      width: 100%;
      max-width: 340px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
    }

    .display {
      background: var(--display-bg);
      border-radius: var(--radius);
      padding: 18px 16px;
      margin-bottom: 16px;
      text-align: right;
      min-height: 92px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      overflow: hidden;
    }

    .display .history {
      color: var(--muted);
      font-size: 1rem;
      min-height: 1.2em;
      word-break: break-all;
    }

    .display .current {
      font-size: 2.4rem;
      font-weight: 600;
      word-break: break-all;
    }

    .keys {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      border: none;
      border-radius: var(--radius);
      padding: 18px 0;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text);
      background: var(--btn);
      cursor: pointer;
      transition: background 0.15s ease, transform 0.05s ease;
      user-select: none;
    }

    button:hover { background: var(--btn-hover); }
    button:active { transform: scale(0.96); }

    button.operator { background: var(--op); }
    button.operator:hover { background: var(--op-hover); }

    button.equals { background: var(--equals); }
    button.equals:hover { background: var(--equals-hover); }

    button.clear { background: var(--clear); }
    button.clear:hover { background: var(--clear-hover); }

    button.span-two { grid-column: span 2; }

    footer {
      margin-top: 16px;
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <main class="calculator" role="application" aria-label="Arithmetic calculator">
    <section class="display" aria-live="polite">
      <div class="history" id="history"></div>
      <div class="current" id="current">0</div>
    </section>

    <section class="keys">
      <button class="clear" data-action="clear" aria-label="All clear">AC</button>
      <button data-action="delete" aria-label="Delete last entry">DEL</button>
      <button class="operator" data-action="percent" aria-label="Percent">%</button>
      <button class="operator" data-operator="/" aria-label="Divide">&divide;</button>

      <button data-number="7">7</button>
      <button data-number="8">8</button>
      <button data-number="9">9</button>
      <button class="operator" data-operator="*" aria-label="Multiply">&times;</button>

      <button data-number="4">4</button>
      <button data-number="5">5</button>
      <button data-number="6">6</button>
      <button class="operator" data-operator="-" aria-label="Subtract">&minus;</button>

      <button data-number="1">1</button>
      <button data-number="2">2</button>
      <button data-number="3">3</button>
      <button class="operator" data-operator="+" aria-label="Add">+</button>

      <button class="span-two" data-number="0">0</button>
      <button data-number="." aria-label="Decimal point">.</button>
      <button class="equals" data-action="equals" aria-label="Equals">=</button>
    </section>

    <footer>Client-side calculator &middot; ADR-001</footer>
  </main>

  <script>
    /**
     * Calculator engine — pure client-side arithmetic logic.
     * Encapsulates state and the four basic operations plus percent.
     */
    class Calculator {
      constructor() {
        this.clear();
      }

      clear() {
        this.currentOperand = '0';
        this.previousOperand = '';
        this.operator = null;
        this.shouldResetCurrent = false;
      }

      delete() {
        if (this.shouldResetCurrent) return;
        this.currentOperand = this.currentOperand.slice(0, -1) || '0';
      }

      appendNumber(value) {
        if (this.shouldResetCurrent) {
          this.currentOperand = '0';
          this.shouldResetCurrent = false;
        }
        if (value === '.' && this.currentOperand.includes('.')) return;
        if (this.currentOperand === '0' && value !== '.') {
          this.currentOperand = value;
        } else {
          this.currentOperand += value;
        }
      }

      chooseOperator(operator) {
        if (this.operator !== null && !this.shouldResetCurrent) {
          this.compute();
        }
        this.operator = operator;
        this.previousOperand = this.currentOperand;
        this.shouldResetCurrent = true;
      }

      percent() {
        const value = parseFloat(this.currentOperand);
        if (isNaN(value)) return;
        this.currentOperand = String(value / 100);
      }

      compute() {
        const prev = parseFloat(this.previousOperand);
        const curr = parseFloat(this.currentOperand);
        if (isNaN(prev) || isNaN(curr) || this.operator === null) return;

        let result;
        switch (this.operator) {
          case '+': result = prev + curr; break;
          case '-': result = prev - curr; break;
          case '*': result = prev * curr; break;
          case '/':
            if (curr === 0) {
              this.currentOperand = 'Error';
              this.previousOperand = '';
              this.operator = null;
              this.shouldResetCurrent = true;
              return;
            }
            result = prev / curr;
            break;
          default: return;
        }

        // Round to avoid floating point noise, then trim trailing zeros.
        this.currentOperand = String(parseFloat(result.toPrecision(12)));
        this.operator = null;
        this.previousOperand = '';
        this.shouldResetCurrent = true;
      }

      getDisplay() {
        const symbols = { '+': '+', '-': '\u2212', '*': '\u00d7', '/': '\u00f7' };
        const history = this.operator
          ? `${this.previousOperand} ${symbols[this.operator]}`
          : '';
        return { history, current: this.currentOperand };
      }
    }

    /** UI wiring */
    (function init() {
      const calc = new Calculator();
      const historyEl = document.getElementById('history');
      const currentEl = document.getElementById('current');

      function render() {
        const { history, current } = calc.getDisplay();
        historyEl.textContent = history;
        currentEl.textContent = current;
      }

      document.querySelectorAll('[data-number]').forEach((btn) => {
        btn.addEventListener('click', () => {
          calc.appendNumber(btn.dataset.number);
          render();
        });
      });

      document.querySelectorAll('[data-operator]').forEach((btn) => {
        btn.addEventListener('click', () => {
          calc.chooseOperator(btn.dataset.operator);
          render();
        });
      });

      document.querySelectorAll('[data-action]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const action = btn.dataset.action;
          if (action === 'clear') calc.clear();
          else if (action === 'delete') calc.delete();
          else if (action === 'equals') calc.compute();
          else if (action === 'percent') calc.percent();
          render();
        });
      });

      // Keyboard support for a friendlier UX.
      window.addEventListener('keydown', (e) => {
        const key = e.key;
        if (/^[0-9]$/.test(key)) { calc.appendNumber(key); }
        else if (key === '.') { calc.appendNumber('.'); }
        else if (['+', '-', '*', '/'].includes(key)) { calc.chooseOperator(key); }
        else if (key === 'Enter' || key === '=') { e.preventDefault(); calc.compute(); }
        else if (key === 'Backspace') { calc.delete(); }
        else if (key === 'Escape') { calc.clear(); }
        else if (key === '%') { calc.percent(); }
        else { return; }
        render();
      });

      render();
    })();
  </script>
</body>
</html>
